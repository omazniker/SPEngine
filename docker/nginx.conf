server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # Pre-compressed static files (gzip + brotli)
    gzip_static on;
    brotli_static on;

    # Gzip on-the-fly fallback
    gzip on;
    gzip_types text/html text/css application/javascript application/json application/wasm font/woff2;
    gzip_min_length 1000;
    gzip_vary on;

    # Statische Assets: 1 Jahr Cache + immutable
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        add_header Vary "Accept-Encoding" always;
    }

    # index.html: kein Cache (immer aktuell)
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
    }

    # Test-App
    location /test/ {
        alias /usr/share/nginx/html/test/;
        try_files $uri $uri/ /test/index.html;
    }

    # Preview-App (uiux-overhaul, parallel zum Live-Deploy)
    location /preview/ {
        alias /usr/share/nginx/html/preview/;
        index index.html;
        try_files $uri $uri/ /preview/index.html =404;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
    }

    # SPA Routing
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Security Headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}
