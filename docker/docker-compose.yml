services:
  app:
    image: fholzer/nginx-brotli:latest
    volumes:
      - /opt/spengine/index.html:/usr/share/nginx/html/index.html:ro
      - /opt/spengine/index.html.gz:/usr/share/nginx/html/index.html.gz:ro
      - /opt/spengine/index.html.br:/usr/share/nginx/html/index.html.br:ro
      - /opt/spengine/data/universum_neu.xlsx:/usr/share/nginx/html/data/universum_neu.xlsx:ro
      - /opt/spengine/assets:/usr/share/nginx/html/assets:ro
      - /opt/spengine/test:/usr/share/nginx/html/test:ro
      - /opt/spengine/preview:/usr/share/nginx/html/preview:ro
      - /opt/spengine/docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped
    networks:
      - web

  api:
    build:
      context: /opt/spengine
      dockerfile: /opt/spengine/Dockerfile.api
    volumes:
      - db_data:/app/db
      - /opt/spengine/data:/app/data:ro
      - /opt/spengine/logs:/app/logs
    environment:
      - NODE_ENV=production
      - DB_PATH=/app/db/spengine.sqlite
      - PORT=3001
      - DATA_DIR=/app/data
      - LOG_DIR=/app/logs
    restart: unless-stopped
    networks:
      - web

  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - app
      - api
    networks:
      - web
    restart: unless-stopped

volumes:
  caddy_data:
  caddy_config:
  db_data:

networks:
  web:
